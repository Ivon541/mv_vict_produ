{% extends "aut_app/base_generica.html" %}

{% block title %}Registro{% endblock %}

{% block content %}
<div class="container-fluid mt-5">
    <div class="row justify-content-center">
        <div class="col-11">
            <div class="card shadow-lg p-4">
                <h2 class="fw-bold text-center text-success">Crear Programas</h2>
                
                <form method="post" action="{% url 'crear_programas' %}">
                    {% csrf_token %}
                
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label">Nombre del programa:</label>
                            <input type="nombre" id="nombre" name="nombre" class="form-control" required>      
                        </div>
                   
                        <div class="col-md-6 mb-3">
                            <label for="tipo_programa" class="form-label">Tipo de Programa:</label>
                            <select id="tipo_programa" name="tipo_programa" class="form-select" required>
                                <option value="vivienda">Vivienda</option>
                                <option value="Alimentacion">Alimentación</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fecha_inicio" class="form-label">Fecha de Inicio:</label>
                            <input type="date" id="fecha_inicio" name="fecha_inicio" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="fecha_fin" class="form-label">Fecha de Finalizacion:</label>
                            <input type="date" id="fecha_fin" name="fecha_fin" class="form-control" required>
                        </div>    
                    </div>
                    
                
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="descirpcion" class="form-label">Descripcion:</label>
                            <input type="descirpcion" id="descripcion" name="descripcion" class="form-control" required>
                        </div>
                    </div> 
            
                    <div class="text-center">
                        <button type="submit" class="btn btn-success btn-lg">Guardar Programa</button>
                        <a href="{% url 'lista_programas' %}" class="btn btn-outline-secondary btn-lg mt-2">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
