{% extends 'victima_app/base_generica.html' %}

{% block content %}
<h2>Eliminar Contrato</h2>

<p>¿Estás seguro de que deseas eliminar el contrato <strong>{{ contrato.nombre }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Eliminar</button>
    <a href="{% url 'contrato_list' %}">Cancelar</a>
</form>
{% endblock %}
