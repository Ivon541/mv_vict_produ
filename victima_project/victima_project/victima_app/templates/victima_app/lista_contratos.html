{% extends "aut_app/base_generica.html" %}

{% block content %}
    <h1>Listado de Contratos</h1>
    <ul>
        {% for contrato in contratos %}
            <li>{{ contrato.nombre }} - {{ contrato.fecha }}</li>
        {% empty %}
            <li>No hay contratos disponibles.</li>
        {% endfor %}
    </ul>
{% endblock %}
