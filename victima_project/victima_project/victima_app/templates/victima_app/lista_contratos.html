<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Contratos</title>
</head>
<body>
    <h1>Listado de Contratos</h1>
    <ul>
        {% for contrato in contratos %}
            <li>{{ contrato.nombre }} - {{ contrato.fecha }}</li>
        {% empty %}
            <li>No hay contratos disponibles.</li>
        {% endfor %}
    </ul>
</body>
</html>
