<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Beneficiario</title>
</head>
<body>
    <h1>Eliminar Beneficiario</h1>
    <p>¿Estás seguro de que deseas eliminar al beneficiario <strong>{{ beneficiario.nombre }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
        <a href="{% url 'eliminar_beneficiary' %}">Cancelar</a>
    </form>
</body>
</html>
