{% extends "aut_app/base_generica.html" %}

{% if not user.is_authenticated %}
    <script>
        window.location.href = "{% url 'login' %}";
    </script>
{% endif %}

{% block title %}Registro{% endblock %}

{% block content %}
<div class="container-fluid mt-5">
    <div class="row justify-content-center">
        <div class="col-11">
            <div class="card shadow-lg p-4">
                <h2 class="fw-bold text-center text-success">Crear Contrato</h2>
                
                <form method="post" action="{% url 'crear_contrato' %}">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fecha_inicio" class="form-label">Fecha Inicio:</label>
                            <input type="date" id="fecha_inicio" name="fecha_inicio" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="fecha_fin" class="form-label">Fecha Fin:</label>
                            <input type="date" id="fecha_fin" name="fecha_fin" class="form-control" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="etapa" class="form-label">Etapa:</label>
                            <select id="etapa" name="etapa" class="form-select" required>
                                <option value="pre">Pre Ejecución</option>
                                <option value="eje">Ejecución</option>
                                <option value="liq">Liquidación</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="beneficiario" class="form-label">Beneficiario:</label>
                            <select id="beneficiario" name="beneficiario" class="form-select" required>
                                {% for beneficiario in beneficiarios %}
                                    <option value="{{ beneficiario.id_beneficiario }}">{{ beneficiario.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-success btn-lg">Guardar Contrato</button>
                        <a href="{% url 'contrato_list' %}" class="btn btn-outline-secondary btn-lg mt-2">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
