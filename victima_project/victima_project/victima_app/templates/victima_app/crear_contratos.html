{% extends "aut_app/base_generica.html" %}

{%block title %}Registro{% endblock %}

{%block content %}
    <h1>Crear Contrato</h1>
    <form method="post"action="{% url 'crear_contrato' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="fecha_inicio">Fecha Inicio:</label>
            <input type="date" id="fecha_inicio" name="fecha_inicio" required>
        </div>
        <div class="form-group">
            <label for="fecha_fin">Fecha Fin:</label>
            <input type="date" id="fecha_fin" name="fecha_fin" required>
        </div>
        <div class="form-group">
            <label for="etapa">Etapa:</label>
            <select id="tipo_contrato" name="tipo_contrato" required>
                <option value="pre">Pre Ejecución</option>
                <option value="eje">Ejecución</option>
                <option value="liq">Liquidación</option>
            </select>
        <button type="submit">Guardar Contrato</button>
    </form>
    <a href="{% url 'contrato_list' %}">Volver a la lista de contratos</a>
{% endblock %}
