<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Beneficiario</title>
</head>
<body>
{% extends 'base.html' %}
{% block content %}
    <h1>Crear Beneficiario</h1>
    <form method="POST" action="{% url 'crear_beneficiario' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Crear Beneficiario</button>
    </form>
    <a href="{% url 'lista_beneficiario' %}">Volver a la lista de beneficiarios</a>
{% endblock %}
</body>
