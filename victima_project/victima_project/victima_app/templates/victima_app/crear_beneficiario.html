{% extends "aut_app/base_generica.html" %}

{%block title %}Registro{% endblock %}

{%block content %}
    <h1>Crear Beneficiarios</h1>
    <form method="post"action="{% url 'crear_beneficiarios' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>
        <div class="form-group">
            <label for="documento_identidad">Numero Documento</label>
            <input type="text" id="documento_identidad" name="documento_identidad" required>
        </div>
        
        <button type="submit">Guardar Beneficiario</button>
    </form>
    <a href="{% url 'beneficiario_list' %}">Volver a la lista de contratos</a>
{% endblock %}
