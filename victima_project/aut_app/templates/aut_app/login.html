{% extends "aut_app/base_generica.html" %}
{%load static%}
{% block content %}
    <div class="login-container d-flex align-items-center justify-content-center" 
         style="min-height: 100vh; background: url('{% static 'aut_app/images/background.jpg' %}') no-repeat center center fixed; background-size: cover;">
        
        <div class="login-box shadow-lg p-4 rounded" style="background: rgba(0, 0, 0, 0.7); border-radius: 12px; width: 400px;">
            <h2 class="text-center fw-bold text-white">Iniciar Sesión</h2>
            <form method="post" action="{% url 'login' %}">
                {% if error %}
                    <div class="alert alert-danger" role="alert">
                        {{ error }}
                    </div>
                {% endif %}
             
            
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label text-white">Usuario:</label>
                    <input type="text" id="username" name="username" class="form-control shadow-sm" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label text-white">Contraseña:</label>
                    <input type="password" id="password" name="password" class="form-control shadow-sm" required>
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill shadow">Acceder</button>
            </form>
    
        </div>
    </div>
{% endblock %}
