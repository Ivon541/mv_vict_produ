{% extends "aut_app/base_generica.html" %}

{% block title %}Registro{% endblock %}

{% block content %}
    <div class="d-flex align-items-center justify-content-center vh-100">
        <div class="card shadow-lg p-4 rounded" style="max-width: 400px; width: 100%; background: rgba(255, 255, 255, 0.9);">
            <h2 class="text-center fw-bold text-primary">Registro</h2>
            <form method="post" action="{% url 'register' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario:</label>
                    <input type="text" id="username" name="username" class="form-control shadow-sm" required>
                </div>
                <div class="mb-3">
                    <label for="firstname" class="form-label">Nombres:</label>
                    <input type="text" id="firstname" name="firstname" class="form-control shadow-sm" required>
                </div>
                <div class="mb-3">
                    <label for="lastname" class="form-label">Apellidos:</label>
                    <input type="text" id="lastname" name="lastname" class="form-control shadow-sm" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" class="form-control shadow-sm" required>
                </div>
                <div class="mb-3">
                    <label for="password1" class="form-label">Contraseña:</label>
                    <input type="password" id="password1" name="password1" class="form-control shadow-sm" required>
                </div>
                <div class="mb-3">
                    <label for="password2" class="form-label">Confirmar Contraseña:</label>
                    <input type="password" id="password2" name="password2" class="form-control shadow-sm" required>
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill shadow">Registrar</button>
            </form>
            <p class="text-center mt-3">¿Ya tienes una cuenta? <a href="{% url 'login' %}" class="text-primary fw-bold">Inicia sesión aquí</a></p>
        </div>
    </div>
{% endblock %}
