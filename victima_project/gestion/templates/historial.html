<head>
    <style>
    /* Estilo para el encabezado */
    h2 {
        font-size: 24px;
        color: #222;
        margin-bottom: 20px;
        text-align: center;
    }

    /* Lista de historial de acciones */
    ul {
        list-style-type: none;
        padding: 0;
        margin: 0;
        font-size: 16px;
        color: #333;
    }

    ul li {
        background-color: #f8f9fa;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    ul li:hover {
        transform: translateY(-5px);
        box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.1);
    }

    /* Enlaces */
    a {
        color: #28a745;
        text-decoration: none;
        font-size: 16px;
        display: inline-block;
        margin-top: 10px;
        transition: color 0.3s;
    }

    a:hover {
        color: #218838;
        text-decoration: underline;
    }

    /* Enlace de "No hay acciones" */
    ul li.no-actions {
        color: #999;
        text-align: center;
        font-style: italic;
    }
</style>
</head>

<h2>Historial de Acciones</h2>
<ul>
  {% for accion in historial %}
    <li>
        <span>{{ accion.fecha }} - {{ accion.accion }}</span>
    </li>
  {% empty %}
    <li class="no-actions">No hay acciones registradas.</li>
  {% endfor %}
</ul>

<a href="{% url 'deshacer_accion' %}">Deshacer última acción</a><br>
<a href="{% url 'ver_turnos' %}">Volver a turnos</a>
